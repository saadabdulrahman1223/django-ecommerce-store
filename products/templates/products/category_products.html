<h1>{{ category.name }}</h1>

{% if products %}
    {% for product in products %}
        <p>
            <a href="{% url 'product_detail' product.id %}">
                {{ product.name }}
            </a>
            - ₹{{ product.price }}
        </p>
    {% endfor %}
{% else %}
    <p>No products in this category.</p>
{% endif %}
